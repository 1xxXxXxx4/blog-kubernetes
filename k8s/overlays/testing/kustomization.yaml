# k8s/overlays/testing/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: postgres

resources:
  - ../../base
  - dummy-secrets.yaml

patches:
  - path: patch-nginx.yaml
  - target:
      kind: Cluster
      name: postgresql
      namespace: postgres
    path: patch-postgres.yaml
    