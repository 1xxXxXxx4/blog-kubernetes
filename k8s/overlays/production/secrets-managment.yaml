# k8s/overlays/production/secrets-managment.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-vault-auth-sa
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth: 
        kubernetes:
          mountPath: "kubernetes"
          role: "kubernetes-blog"
          serviceAccountRef:
            name: "eso-vault-auth-sa"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: root-secret
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: pg-root
    creationPolicy: Owner
  data: 
    - secretKey: password
      remoteRef: 
        key: prod/root-db
        property: password 
    - secretKey: username
      remoteRef: 
        key: prod/root-db
        property: username
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: user-secret
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: pg-user
    creationPolicy: Owner
  data: 
    - secretKey: password
      remoteRef: 
        key: prod/user-db
        property: password 
    - secretKey: username
      remoteRef: 
        key: prod/user-db
        property: username
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prod-specs
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    namespace: postgres
  target: 
    name: pg-specs
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: prod/spec-db
        property: DB_HOST
    - secretKey: DB_PORT
      remoteRef:
        key: prod/spec-db
        property: DB_PORT
    

