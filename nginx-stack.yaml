apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-php
  namespace: www-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: server-www-php
  template:
    metadata:
      labels:
        app: server-www-php
    spec:
      imagePullSecrets:
        - name: ghcr-secret 
      containers:
      - name: nginx-deplo
        image: ghcr.io/1xxxxxxx4/blog-kubernetes-nginx:latest
        imagePullPolicy: Always
        ports:
          - containerPort: 80

      - name: php-deplo
        image: ghcr.io/1xxxxxxx4/blog-kubernetes-php:latest
        imagePullPolicy: Always
        ports:
          - containerPort: 9000
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  namespace: postgres
spec:
  description: "Postgresdb"
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie
  imagePullPolicy: IfNotPresent
  instances: 3

  bootstrap:
    initdb:
      database: ${DB_NAME}
      owner: ${DB_OWNER}
      secret:
        name: db-pass
---

